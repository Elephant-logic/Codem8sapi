<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07101c"><script>(function(){var q=new URLSearchParams(location.search),id=q.get('id')||localStorage.getItem('codem8s_mobile_selected_app');if(id){var l=document.createElement('link');l.rel='manifest';l.href='/mobile/manifest/'+encodeURIComponent(id)+'.webmanifest?v=10.8.7';document.head.appendChild(l);var a=document.createElement('link');a.rel='apple-touch-icon';a.href='/mobile/icon/'+encodeURIComponent(id);document.head.appendChild(a)}})();</script><title>Loading app</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#07101c;color:#edf5ff;font-family:system-ui,sans-serif}body{display:grid;grid-template-rows:auto 1fr}.bar{display:flex;gap:10px;align-items:center;padding:10px 12px;background:#0b1728;border-bottom:1px solid #29425f}.icon{width:46px;height:46px;border-radius:12px;object-fit:cover}.title{min-width:0;flex:1}.title strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.title small{color:#8fa4c1}.btn{min-height:44px;padding:10px 14px;border:1px solid #365477;border-radius:12px;background:#142843;color:#edf5ff;font-weight:800}.primary{border:0;background:linear-gradient(135deg,#64dcff,#927cff);color:#06101b}.stage iframe{width:100%;height:calc(100vh - 67px);border:0;background:white}.message{padding:24px}.hidden{display:none!important}</style></head><body><header class="bar"><img id="icon" class="icon" alt=""><div class="title"><strong id="name">Loading app…</strong><small id="state">Preparing installer…</small></div><button id="install" class="btn primary hidden">Install</button><button id="reload" class="btn">Reload</button></header><main class="stage"><div id="message" class="message"><h1>Loading app…</h1><p>This installs a saved Codem8s mobile preview from this device.</p></div><iframe id="app" class="hidden" title="Mobile app"></iframe></main><script>
const STORE='codem8s_app_store_v1',q=new URLSearchParams(location.search),id=q.get('id')||localStorage.getItem('codem8s_mobile_selected_app'),frame=document.getElementById('app'),message=document.getElementById('message'),state=document.getElementById('state'),installButton=document.getElementById('install');let promptEvent;
function apps(){try{return JSON.parse(localStorage.getItem(STORE)||'[]')}catch{return[]}}function framework(p){const n=Object.keys(p?.files||{}),pkg=n.find(x=>/(^|\/)package\.json$/i.test(x));return n.some(x=>/\.(tsx?|jsx)$/i.test(x))||!!(pkg&&/"(?:react|vite|typescript|next|webpack)"\s*:/i.test(p.files[pkg]||''))}function norm(base,ref){const out=[];for(const x of base.split('/').slice(0,-1).concat(ref.split('/'))){if(!x||x==='.')continue;x==='..'?out.pop():out.push(x)}return out.join('/')}function staticHtml(p){const f=p.files||{},n=Object.keys(f),entry=n.find(x=>/(^|\/)index\.html?$/i.test(x))||n.find(x=>/\.html?$/i.test(x));if(!entry)throw Error('No HTML entry file was found.');let h=String(f[entry]||'');h=h.replace(/<link\b([^>]*?)href=["']([^"']+)["']([^>]*)>/gi,(a,b,r)=>{const x=norm(entry,r);return f[x]!=null&&/\.css$/i.test(x)?'<style>'+f[x]+'</style>':a});h=h.replace(/<script\b([^>]*?)src=["']([^"']+)["']([^>]*)><\/script>/gi,(a,b,r,c)=>{const x=norm(entry,r);return f[x]!=null?'<script'+b+c+'>'+String(f[x]).replace(/<\/script/gi,'<\\/script')+'<\/script>':a});return h}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();promptEvent=e;installButton.classList.remove('hidden');state.textContent='Ready to install'});window.addEventListener('appinstalled',()=>{state.textContent='Installed on this phone';installButton.classList.add('hidden')});installButton.onclick=async()=>{if(promptEvent){promptEvent.prompt();await promptEvent.userChoice;promptEvent=null}else alert('Chrome has not offered the automatic prompt. Open the browser menu (⋮) and choose Add to Home screen or Install app.')};document.getElementById('reload').onclick=()=>location.reload();
async function setupIdentity(item){const appName=String(item.installName||item.name||item.project.name||'App').trim()||'App',appIcon=item.icon||'/codem8s-app-icon.svg';document.getElementById('name').textContent=appName;document.getElementById('icon').src=appIcon;document.title=appName;localStorage.setItem('codem8s_mobile_selected_app',item.id);if(!('serviceWorker'in navigator))return;await navigator.serviceWorker.register('/mobile/sw.js',{scope:'/mobile/'});const cache=await caches.open('codem8s-mobile-meta-v2');const type=(String(appIcon).match(/^data:([^;,]+)/)||[])[1]||'image/svg+xml';await cache.put('/mobile/meta/'+encodeURIComponent(item.id),new Response(JSON.stringify({name:appName,icon:appIcon,iconType:type}),{headers:{'Content-Type':'application/json'}}));await navigator.serviceWorker.ready;if(!navigator.serviceWorker.controller){location.reload();return new Promise(()=>{})}}
async function load(){const item=apps().find(x=>x.id===id)||apps()[0];if(!item?.project){message.innerHTML='<h1>App unavailable</h1><p>Save it in My Apps first.</p>';state.textContent='Not found';return}await setupIdentity(item);installButton.classList.remove('hidden');state.textContent='Preparing demo mobile preview…';try{let html;if(framework(item.project)){const r=await fetch('/api/build-preview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({files:item.project.files})}),d=await r.json();if(!r.ok)throw Error(d?.error?.message||'Framework preview failed');html=d.html}else html=staticHtml(item.project);frame.srcdoc=html;frame.classList.remove('hidden');message.classList.add('hidden');state.textContent=promptEvent?'Ready to install':'Tap Install or use browser menu'}catch(e){message.innerHTML='<h1>App could not load</h1><p>'+String(e.message||e)+'</p>';state.textContent='Load failed'}}load();
</script></body></html>
