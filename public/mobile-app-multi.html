<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07101c"><title>Preparing app</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#07101c;color:#edf5ff;font-family:system-ui,sans-serif}body{display:grid;grid-template-rows:auto 1fr}.bar{display:flex;gap:10px;align-items:center;padding:10px 12px;background:#0b1728;border-bottom:1px solid #29425f}.icon{width:46px;height:46px;border-radius:12px;object-fit:cover;background:#142843}.title{min-width:0;flex:1}.title strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.title small{color:#8fa4c1}.btn{min-height:44px;padding:10px 14px;border:1px solid #365477;border-radius:12px;background:#142843;color:#edf5ff;font-weight:800}.btn:disabled{opacity:.45}.primary{border:0;background:linear-gradient(135deg,#64dcff,#927cff);color:#06101b}.stage iframe{width:100%;height:calc(100vh - 67px);border:0;background:white}.message{padding:24px}.hidden{display:none!important}</style></head><body><header class="bar"><img id="icon" class="icon" alt=""><div class="title"><strong id="name">Loading app…</strong><small id="state">Preparing proper app install…</small></div><button id="install" class="btn primary" disabled>Install</button><button id="reload" class="btn">Reload</button></header><main class="stage"><div id="message" class="message"><h1>Preparing app…</h1><p>This creates a separate installed app for this saved project.</p></div><iframe id="app" class="hidden" title="Saved app"></iframe></main><script>
const STORE='codem8s_app_store_v1';
const match=location.pathname.match(/^\/mobile-apps\/([^/]+)\/$/);
const safeId=match?decodeURIComponent(match[1]):'';
const base=location.pathname;
const cacheName='codem8s-isolated-v4-'+safeId;
const items=(()=>{try{return JSON.parse(localStorage.getItem(STORE)||'[]')}catch{return[]}})();
const item=items.find(x=>String(x.id).replace(/[^a-z0-9_-]/gi,'-')===safeId);
const frame=document.getElementById('app'),message=document.getElementById('message'),state=document.getElementById('state'),installButton=document.getElementById('install');
let promptEvent=null;
function framework(p){const n=Object.keys(p?.files||{}),pkg=n.find(x=>/(^|\/)package\.json$/i.test(x));return n.some(x=>/\.(tsx?|jsx)$/i.test(x))||!!(pkg&&/"(?:react|vite|typescript|next|webpack)"\s*:/i.test(p.files[pkg]||''))}
function norm(baseName,ref){const out=[];for(const x of baseName.split('/').slice(0,-1).concat(ref.split('/'))){if(!x||x==='.')continue;x==='..'?out.pop():out.push(x)}return out.join('/')}
function staticHtml(p){const f=p.files||{},n=Object.keys(f),entry=n.find(x=>/(^|\/)index\.html?$/i.test(x))||n.find(x=>/\.html?$/i.test(x));if(!entry)throw Error('No HTML entry file was found.');let h=String(f[entry]||'');h=h.replace(/<link\b([^>]*?)href=["']([^"']+)["']([^>]*)>/gi,(a,b,r)=>{const x=norm(entry,r);return f[x]!=null&&/\.css$/i.test(x)?'<style>'+f[x]+'</style>':a});h=h.replace(/<script\b([^>]*?)src=["']([^"']+)["']([^>]*)><\/script>/gi,(a,b,r,c)=>{const x=norm(entry,r);return f[x]!=null?'<script'+b+c+'>'+String(f[x]).replace(/<\/script/gi,'<\\/script')+'<\/script>':a});return h}
function loadImage(src){return new Promise((resolve,reject)=>{const image=new Image();image.onload=()=>resolve(image);image.onerror=()=>reject(Error('The selected icon could not be prepared.'));image.src=src})}
async function pngIcon(src,size){const image=await loadImage(src);const canvas=document.createElement('canvas');canvas.width=size;canvas.height=size;const ctx=canvas.getContext('2d');ctx.fillStyle='#07101c';ctx.fillRect(0,0,size,size);const scale=Math.min(size/image.naturalWidth,size/image.naturalHeight);const width=image.naturalWidth*scale,height=image.naturalHeight*scale;ctx.drawImage(image,(size-width)/2,(size-height)/2,width,height);return new Promise((resolve,reject)=>canvas.toBlob(blob=>blob?resolve(blob):reject(Error('The app icon could not be converted.')),'image/png'))}
async function prepareIdentity(appName,iconSource){const cache=await caches.open(cacheName);const [icon192,icon512]=await Promise.all([pngIcon(iconSource,192),pngIcon(iconSource,512)]);const manifest={name:appName,short_name:appName.slice(0,24),id:base,start_url:base,scope:base,display:'standalone',background_color:'#07101c',theme_color:'#07101c',prefer_related_applications:false,icons:[{src:base+'icon-192.png',sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:base+'icon-512.png',sizes:'512x512',type:'image/png',purpose:'any maskable'}]};await Promise.all([cache.put(base+'manifest.webmanifest',new Response(JSON.stringify(manifest),{headers:{'Content-Type':'application/manifest+json','Cache-Control':'no-store'}})),cache.put(base+'icon-192.png',new Response(icon192,{headers:{'Content-Type':'image/png','Cache-Control':'no-store'}})),cache.put(base+'icon-512.png',new Response(icon512,{headers:{'Content-Type':'image/png','Cache-Control':'no-store'}}))])}
async function ensureControlled(){if(!('serviceWorker'in navigator)||!('caches'in window))throw Error('This browser does not support proper app installation.');await navigator.serviceWorker.register('sw.js?v=4',{scope:'./'});await navigator.serviceWorker.ready;if(navigator.serviceWorker.controller)return true;state.textContent='Finishing one-time setup…';await new Promise(resolve=>{const timer=setTimeout(resolve,4000);navigator.serviceWorker.addEventListener('controllerchange',()=>{clearTimeout(timer);resolve()},{once:true})});location.replace(base+'?ready=1');return false}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();promptEvent=e;state.textContent='Ready to install';installButton.disabled=false});
window.addEventListener('appinstalled',()=>{state.textContent='Installed on this phone';installButton.disabled=true});
installButton.onclick=async()=>{if(!promptEvent)return;promptEvent.prompt();await promptEvent.userChoice;promptEvent=null;installButton.disabled=true};
document.getElementById('reload').onclick=()=>location.reload();
async function load(){try{if(!item?.project)throw Error('Saved app not found. Open Codem8s and save it again.');const appName=String(item.installName||item.name||'App').trim()||'App';const appIcon=item.icon||'/codem8s-app-icon.svg';document.getElementById('name').textContent=appName;document.getElementById('icon').src=appIcon;document.title=appName;await prepareIdentity(appName,appIcon);if(!await ensureControlled())return;document.querySelectorAll('link[rel="manifest"]').forEach(x=>x.remove());const manifest=document.createElement('link');manifest.rel='manifest';manifest.href='manifest.webmanifest?v='+(item.updatedAt||Date.now());document.head.appendChild(manifest);const apple=document.createElement('link');apple.rel='apple-touch-icon';apple.href='icon-192.png?v='+(item.updatedAt||Date.now());document.head.appendChild(apple);state.textContent='Loading saved app…';let html;if(framework(item.project)){const r=await fetch('/api/build-preview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({files:item.project.files})}),d=await r.json();if(!r.ok)throw Error(d?.error?.message||'Framework preview failed');html=d.html}else html=staticHtml(item.project);frame.srcdoc=html;frame.classList.remove('hidden');message.classList.add('hidden');if(!promptEvent)state.textContent='App ready — preparing Install'}catch(e){message.innerHTML='<h1>App could not load</h1><p>'+String(e.message||e)+'</p>';state.textContent='Load failed'}}
load();
</script></body></html>
