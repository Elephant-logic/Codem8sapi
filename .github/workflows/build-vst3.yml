name: Build Codem8s VST3
run-name: Build VST3 ${{ inputs.request_id || github.event.head_commit.message }}

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: VST build request ID
        required: true
        type: string
  push:
    paths:
      - 'vst-build-requests/*.json'

permissions:
  contents: write

env:
  REQUEST_ID: ${{ inputs.request_id }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libjack-jackd2-dev ladspa-sdk libcurl4-openssl-dev libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev
      - name: Read request and prepare project
        shell: bash
        run: |
          if [ -n "$REQUEST_ID" ]; then
            FILE="vst-build-requests/${REQUEST_ID}.json"
          else
            FILE=$(find vst-build-requests -maxdepth 1 -type f -name '*.json' -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -1 | cut -d' ' -f2-)
            if [ -z "$FILE" ]; then FILE=$(ls -t vst-build-requests/*.json | head -1); fi
          fi
          test -f "$FILE" || { echo "VST request not found: $FILE"; exit 1; }
          ID=$(jq -r '.id' "$FILE")
          NAME=$(jq -r '.name' "$FILE")
          MAKER=$(jq -r '.manufacturer' "$FILE")
          WAVE=$(jq -r '.waveform' "$FILE")
          case "$WAVE" in sine) WAVE_ID=0;; saw) WAVE_ID=1;; square) WAVE_ID=2;; *) WAVE_ID=3;; esac
          SAFE=$(echo "$NAME" | tr -cd '[:alnum:]' | tr '[:upper:]' '[:lower:]')
          cp -R vst-template vst-build
          sed -i.bak "s/__PLUGIN_NAME__/$NAME/g; s/__MANUFACTURER__/$MAKER/g; s/__PLUGIN_ID__/$SAFE/g; s/__WAVEFORM__/$WAVE_ID/g" vst-build/CMakeLists.txt || true
          rm -f vst-build/CMakeLists.txt.bak
          echo "ID=$ID" >> "$GITHUB_ENV"
          echo "NAME=$NAME" >> "$GITHUB_ENV"
      - name: Configure
        run: cmake -S vst-build -B vst-build/out -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build vst-build/out --config Release --parallel 2
      - name: Package
        shell: bash
        run: |
          mkdir -p package
          FOUND=0
          while IFS= read -r -d '' item; do
            cp -R "$item" package/
            FOUND=1
          done < <(find vst-build/out \( -type d -o -type f \) -name '*.vst3' -print0)
          test "$FOUND" = 1 || { echo 'No VST3 output was produced.'; find vst-build/out -maxdepth 5 -type f | head -100; exit 1; }
          cd package
          7z a "../${ID}-${{ matrix.label }}.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ID }}-${{ matrix.label }}
          path: ${{ env.ID }}-${{ matrix.label }}.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read request
        shell: bash
        run: |
          if [ -n "$REQUEST_ID" ]; then
            FILE="vst-build-requests/${REQUEST_ID}.json"
          else
            FILE=$(find vst-build-requests -maxdepth 1 -type f -name '*.json' -printf '%T@ %p\n' | sort -nr | head -1 | cut -d' ' -f2-)
          fi
          test -f "$FILE" || { echo "VST request not found: $FILE"; exit 1; }
          echo "ID=$(jq -r '.id' "$FILE")" >> "$GITHUB_ENV"
          echo "NAME=$(jq -r '.name' "$FILE")" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.ID }}-*
          merge-multiple: true
      - name: Publish VST3 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls -la ./*.zip
          gh release delete "vst-$ID" --yes --cleanup-tag 2>/dev/null || true
          gh release create "vst-$ID" ./*.zip --title "$NAME VST3" --notes "Cross-platform VST3 instrument generated by Codem8s. Unsigned development build."
